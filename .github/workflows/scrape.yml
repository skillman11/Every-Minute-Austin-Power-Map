# scrape.yml v1.3
# v1.0 - Initial version, runs every 5 minutes
# v1.1 - Changed to every 1 minute
# v1.2 - Pinned action versions for Node.js 24, added retry loop for push conflicts
# v1.3 - Added mercantile and polyline dependencies for outage location scraping

name: Scrape Austin Energy Outages

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4.2.2
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests mercantile polyline

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Outage snapshot $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            sleep 5
          done
